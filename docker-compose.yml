version: '3.8'
services:
  padel-booking:
    image: padel-booking:latest
    restart: always
    container_name: padel-booking
    ports:
      - "8085:8080"
    volumes:
      - padel-storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=
      - APP_URL=https://padel.ngodingyuk.site
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=padel
      - DB_USERNAME=padel
      - DB_PASSWORD=${DB_PASSWORD:-ChangeMe}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - PAYMENT_GATEWAY=DummyPaymentGateway
    labels:
      - traefik.enable=true
      - traefik.http.routers.padel.rule=Host(`padel.ngodingyuk.site`)
      - traefik.http.routers.padel.tls=true
      - traefik.http.routers.padel.tls.certresolver=letsencrypt
      - traefik.http.services.padel.loadbalancer.server.port=8080
      - coolify.managed=true
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=padel
      - POSTGRES_USER=padel
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ChangeMe}
    volumes:
      - padel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - padel-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  padel-storage:
  padel-pgdata:
  padel-redis:
